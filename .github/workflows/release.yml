name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p /tmp/release/protocolsmanager
          cp -r . /tmp/release/protocolsmanager/
          rm -rf /tmp/release/protocolsmanager/.git
          rm -rf /tmp/release/protocolsmanager/.github
          rm -f /tmp/release/protocolsmanager/notes.md
          rm -f /tmp/release/protocolsmanager/.gitignore
          rm -f /tmp/release/protocolsmanager/CHANGELOG.md
          cd /tmp/release
          zip -r $GITHUB_WORKSPACE/protocolsmanager-${VERSION}.zip protocolsmanager/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: protocolsmanager-*.zip
